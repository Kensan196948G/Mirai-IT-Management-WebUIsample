<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Integrated IT Asset Service Management | WebUI Sample</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Murecho:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand"><div class="brand-icon">I</div><div><p class="brand-title">IITASM</p><p class="brand-sub">Asset / SAM / CMDB</p></div></div>
        <nav class="nav">
          <button class="nav-item is-active" data-view="overview">ダッシュボード</button>
          <button class="nav-item" data-view="assets">資産</button>
          <button class="nav-item" data-view="software">ソフトウェア</button>
          <button class="nav-item" data-view="procurement">調達</button>
          <button class="nav-item" data-view="cmdb">CMDB</button>
          <button class="nav-item" data-view="security">セキュリティ</button>
          <button class="nav-item" data-view="reports">レポート</button>
          <button class="nav-item" data-view="settings">システム設定</button>
        </nav>
      </aside>
      <main class="main">
        <header class="topbar"><div><p class="eyebrow">README から再設計したサンプル</p><h1 id="pageTitle">ダッシュボード</h1></div><button class="btn primary" id="notifyBtn">通知更新</button></header>
        <section class="hero"><div><p class="eyebrow">ISO 20000 / ITSM</p><h2>IT資産、SAM、CMDB、通知、監査を一体で管理</h2><p class="lead">資産ライフサイクル、ライセンス、調達、構成管理、認証・監査を切り替えながら確認できます。</p></div><div class="hero-badges" id="heroBadges"></div></section>
        <section class="view is-active" id="view-overview"><div class="stats-grid" id="statsGrid"></div><div class="grid two-col"><article class="panel"><div class="panel-head"><h3>アラート</h3></div><div id="alertList" class="stack-list"></div></article><article class="panel"><div class="panel-head"><h3>承認待ち</h3></div><div id="approvalList" class="stack-list"></div></article></div><div class="grid two-col"><article class="panel"><div class="panel-head"><h3>資産カテゴリ構成</h3></div><div id="assetChart" class="mini-chart"></div></article><article class="panel"><div class="panel-head"><h3>更新期限表</h3></div><div id="renewalTable" class="table-wrap"></div></article></div></section>
        <section class="view" id="view-assets"><article class="panel"><div class="panel-head"><h3>資産一覧</h3></div><div id="assetList" class="card-list columns-3"></div></article></section>
        <section class="view" id="view-software"><article class="panel"><div class="panel-head"><h3>ソフトウェア台帳</h3></div><div id="softwareList" class="card-list"></div></article></section>
        <section class="view" id="view-procurement"><article class="panel"><div class="panel-head"><h3>調達・契約</h3></div><div id="procurementList" class="card-list"></div></article></section>
        <section class="view" id="view-cmdb"><article class="panel"><div class="panel-head"><h3>構成アイテム</h3></div><div id="cmdbList" class="card-list"></div></article></section>
        <section class="view" id="view-security"><article class="panel"><div class="panel-head"><h3>認証・監査</h3></div><div id="securityList" class="card-list"></div></article></section>
        <section class="view" id="view-reports"><article class="panel"><div class="panel-head"><h3>レポート</h3></div><div id="reportList" class="card-list"></div></article></section>
        <section class="view" id="view-settings"><div class="grid two-col"><article class="panel"><div class="panel-head"><h3>システム設定</h3></div><div id="settingsList" class="card-list"></div></article><article class="panel"><div class="panel-head"><h3>設定詳細</h3></div><div id="settingsDetail" class="card-list"></div></article></div></section>
      </main>
    </div>
    <script src="./js/app.js"></script>
  </body>
</html>
