<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3-2-1-1-0 バックアップ管理システム | WebUI Sample</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Murecho:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" role="complementary" aria-label="サイドバー">
        <div class="brand"><div class="brand-icon">B</div><div><p class="brand-title">Backup Console</p><p class="brand-sub">3-2-1-1-0 Rule</p></div></div>
        <nav class="nav" role="navigation" aria-label="メインナビゲーション">
          <button class="nav-item is-active" data-view="dashboard" aria-current="page">ダッシュボード</button>
          <button class="nav-item" data-view="jobs">ジョブ</button>
          <button class="nav-item" data-view="media">メディア</button>
          <button class="nav-item" data-view="verification">検証</button>
          <button class="nav-item" data-view="reports">レポート</button>
          <button class="nav-item" data-view="alerts">通知</button>
          <button class="nav-item" data-view="integrations">連携</button>
          <button class="nav-item" data-view="settings">システム設定</button>
        </nav>
      </aside>
      <main class="main" role="main">
        <header class="topbar"><div><p class="eyebrow">README から再構成した動的デモ</p><h1 id="pageTitle">ダッシュボード</h1></div><button class="btn primary" id="simulateBtn">状態更新</button></header>
        <section class="hero"><div><p class="eyebrow">Compliance Center</p><h2>バックアップ完全性と媒体統制を可視化</h2><p class="lead">準拠、検証、媒体、通知、レポート、PowerShell 連携まで確認できるサンプル画面です。</p></div><div class="hero-badges" id="heroBadges"></div></section>
        <section class="view is-active" id="view-dashboard"><div class="stats-grid" id="statsGrid" role="region" aria-label="統計情報"></div><div class="grid two-col"><article class="panel"><div class="panel-head"><h3>準拠状況</h3></div><div id="ruleList" class="stack-list"></div></article><article class="panel"><div class="panel-head"><h3>最新アラート</h3></div><div id="alertList" class="stack-list"></div></article></div><div class="grid two-col"><article class="panel"><div class="panel-head"><h3>週次成功率</h3></div><div id="successChart" class="mini-chart"></div></article><article class="panel"><div class="panel-head"><h3>ジョブ実行表</h3></div><div id="jobTable" class="table-wrap"></div></article></div></section>
        <section class="view" id="view-jobs"><article class="panel"><div class="panel-head"><h3>バックアップジョブ</h3></div><div id="jobList" class="card-list columns-3"></div></article></section>
        <section class="view" id="view-media"><article class="panel"><div class="panel-head"><h3>オフライン / オフサイト媒体</h3></div><div id="mediaList" class="card-list"></div></article></section>
        <section class="view" id="view-verification"><article class="panel"><div class="panel-head"><h3>検証ジョブ</h3></div><div id="verificationList" class="card-list"></div></article></section>
        <section class="view" id="view-reports"><article class="panel"><div class="panel-head"><h3>レポートテンプレート</h3></div><div id="reportList" class="card-list"></div></article></section>
        <section class="view" id="view-alerts"><article class="panel"><div class="panel-head"><h3>通知チャネル</h3></div><div id="channelList" class="card-list"></div></article></section>
        <section class="view" id="view-integrations"><article class="panel"><div class="panel-head"><h3>バックアップツール連携</h3></div><div id="integrationList" class="card-list"></div></article></section>
        <section class="view" id="view-settings"><div class="grid two-col"><article class="panel"><div class="panel-head"><h3>システム設定</h3></div><div id="settingsList" class="card-list"></div></article><article class="panel"><div class="panel-head"><h3>設定詳細</h3></div><div id="settingsDetail" class="card-list"></div></article></div></section>
      </main>
    </div>
    <script src="../../shared/ui-utils.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
