<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Linux管理運用システム | WebUI Sample</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Murecho:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" role="complementary" aria-label="サイドバー">
        <div class="brand"><div class="brand-icon">L</div><div><p class="brand-title">Linux管理運用</p><p class="brand-sub">Control First</p></div></div>
        <nav class="nav" role="navigation" aria-label="メインナビゲーション">
          <button class="nav-item is-active" data-view="overview" aria-current="page">ダッシュボード</button>
          <button class="nav-item" data-view="services">System Servers</button>
          <button class="nav-item" data-view="processes">Processes</button>
          <button class="nav-item" data-view="network">Network</button>
          <button class="nav-item" data-view="firewall">Firewall</button>
          <button class="nav-item" data-view="approvals">承認</button>
          <button class="nav-item" data-view="audit">監査</button>
          <button class="nav-item" data-view="settings">システム設定</button>
        </nav>
      </aside>
      <main class="main" role="main">
        <header class="topbar"><div><p class="eyebrow">README に基づく動的統制 UI</p><h1 id="pageTitle">ダッシュボード</h1></div><button class="btn primary" id="refreshBtn">統制再確認</button></header>
        <section class="hero"><div><p class="eyebrow">Secure Linux Operations</p><h2>便利さより統制を優先する Linux 運用管理</h2><p class="lead">Allowlist、wrapper、承認、監査の思想を前提に、運用対象モジュールを切り替えながら確認できます。</p></div><div class="hero-badges" id="heroBadges"></div></section>
        <section class="view is-active" id="view-overview"><div class="stats-grid" id="statsGrid" role="region" aria-label="統計情報"></div><div class="grid two-col"><article class="panel"><div class="panel-head"><h3>禁止操作</h3></div><div id="forbiddenList" class="stack-list"></div></article><article class="panel"><div class="panel-head"><h3>最近の修正</h3></div><div id="fixList" class="stack-list"></div></article></div><div class="grid two-col"><article class="panel"><div class="panel-head"><h3>モジュール状態</h3></div><div id="serviceChart" class="mini-chart"></div></article><article class="panel"><div class="panel-head"><h3>監査表</h3></div><div id="auditTable" class="table-wrap"></div></article></div></section>
        <section class="view" id="view-services"><article class="panel"><div class="panel-head"><h3>サービス管理</h3></div><div id="serviceList" class="card-list columns-3"></div></article></section>
        <section class="view" id="view-processes"><article class="panel"><div class="panel-head"><h3>実行プロセス</h3></div><div id="processList" class="card-list"></div></article></section>
        <section class="view" id="view-network"><article class="panel"><div class="panel-head"><h3>ネットワーク構成</h3></div><div id="networkList" class="card-list"></div></article></section>
        <section class="view" id="view-firewall"><article class="panel"><div class="panel-head"><h3>Firewall / Package</h3></div><div id="firewallList" class="card-list"></div></article></section>
        <section class="view" id="view-approvals"><div class="grid two-col"><article class="panel"><div class="panel-head"><h3>ロール</h3></div><div id="roleList" class="card-list"></div></article><article class="panel"><div class="panel-head"><h3>承認フロー</h3></div><div id="approvalList" class="card-list"></div></article></div></section>
        <section class="view" id="view-audit"><article class="panel"><div class="panel-head"><h3>監査チェック</h3></div><div id="auditList" class="card-list"></div></article></section>
        <section class="view" id="view-settings"><div class="grid two-col"><article class="panel"><div class="panel-head"><h3>システム設定</h3></div><div id="settingsList" class="card-list"></div></article><article class="panel"><div class="panel-head"><h3>設定詳細</h3></div><div id="settingsDetail" class="card-list"></div></article></div></section>
      </main>
    </div>
    <script src="../../shared/ui-utils.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
