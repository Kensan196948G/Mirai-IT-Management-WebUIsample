<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>建設土木ナレッジシステム | WebUI Sample</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Murecho:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand"><div class="brand-icon">K</div><div><p class="brand-title">建設土木ナレッジ</p><p class="brand-sub">Knowledge / SOP / Incident</p></div></div>
        <nav class="nav">
          <button class="nav-item is-active" data-view="overview">ダッシュボード</button>
          <button class="nav-item" data-view="knowledge">ナレッジ</button>
          <button class="nav-item" data-view="search">検索・推薦</button>
          <button class="nav-item" data-view="approvals">承認・配信</button>
          <button class="nav-item" data-view="incidents">事故・ヒヤリ</button>
          <button class="nav-item" data-view="consultation">専門家相談</button>
          <button class="nav-item" data-view="audit">監査・KPI</button>
          <button class="nav-item" data-view="settings">システム設定</button>
        </nav>
      </aside>
      <main class="main">
        <header class="topbar"><div><p class="eyebrow">README を元に再設計したデモ</p><h1 id="pageTitle">ダッシュボード</h1></div><button class="btn primary" id="notifyBtn">通知デモ</button></header>
        <section class="hero"><div><p class="eyebrow">Field Knowledge Hub</p><h2>現場知見、SOP、法令、事故情報を一元管理</h2><p class="lead">条件検索、承認配信、事故共有、専門家相談まで切り替えながら確認できるナレッジ UI です。</p></div><div class="hero-badges" id="heroBadges"></div></section>
        <section class="view is-active" id="view-overview"><div class="stats-grid" id="statsGrid"></div><div class="grid two-col"><article class="panel"><div class="panel-head"><h3>重要通知</h3></div><div id="noticeList" class="stack-list"></div></article><article class="panel"><div class="panel-head"><h3>KPI</h3></div><div id="kpiList" class="stack-list"></div></article></div><div class="grid two-col"><article class="panel"><div class="panel-head"><h3>ナレッジ種別構成</h3></div><div id="knowledgeChart" class="mini-chart"></div></article><article class="panel"><div class="panel-head"><h3>更新一覧表</h3></div><div id="knowledgeTable" class="table-wrap"></div></article></div></section>
        <section class="view" id="view-knowledge"><article class="panel"><div class="panel-head"><h3>ナレッジ一覧</h3></div><div id="knowledgeList" class="card-list columns-3"></div></article></section>
        <section class="view" id="view-search"><article class="panel"><div class="panel-head"><h3>検索・関連推薦</h3></div><div class="compose"><input id="searchTerm" type="search" placeholder="例: 切梁, 打設, 法令" /><button class="btn primary" id="runSearchBtn">検索</button></div><div id="searchResultList" class="card-list"></div></article></section>
        <section class="view" id="view-approvals"><article class="panel"><div class="panel-head"><h3>承認・配信フロー</h3></div><div id="approvalList" class="card-list"></div></article></section>
        <section class="view" id="view-incidents"><article class="panel"><div class="panel-head"><h3>事故・ヒヤリ</h3></div><div id="incidentList" class="card-list"></div></article></section>
        <section class="view" id="view-consultation"><article class="panel"><div class="panel-head"><h3>専門家相談</h3></div><div id="consultList" class="card-list"></div></article></section>
        <section class="view" id="view-audit"><article class="panel"><div class="panel-head"><h3>監査・KPI</h3></div><div id="auditList" class="card-list"></div></article></section>
        <section class="view" id="view-settings"><div class="grid two-col"><article class="panel"><div class="panel-head"><h3>システム設定</h3></div><div id="settingsList" class="card-list"></div></article><article class="panel"><div class="panel-head"><h3>設定詳細</h3></div><div id="settingsDetail" class="card-list"></div></article></div></section>
      </main>
    </div>
    <script src="./js/app.js"></script>
  </body>
</html>
